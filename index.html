      color: #a0ffa0;
      background: #0a0a12;

      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 11px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: inherit;

      background: var(--card);

      border-radius: var(--r);
      margin: 14px 0;
      overflow: hidden;

    .stat {

      background: transparent;

    .vbtn.v-no:hover   { border-color: var(--no);    color: var(--no);    background: rgba(107,114,128,0.1); }
    .vbtn.v-maybe:hover{ border-color: var(--maybe); color: var(--maybe); background: rgba(245,158,11,0.1); }
    .vbtn.v-yes.on  { border-color: var(--yes);   color: var(--yes);   background: rgba(34,197,94,0.15); }
    .vbtn.v-no.on   { border-color: var(--no);    color: var(--no);    background: rgba(107,114,128,0.15); }
    .vbtn.v-maybe.on{ border-color: var(--maybe); color: var(--maybe); background: rgba(245,158,11,0.15); }

    /* ── Match pill ── */
    .match-pill {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 2px 7px;
      border-radius: 20px;

    .empty {
      text-align: center;
      padding: 50px 20px;
      color: var(--muted);
    }
    .empty h3 { color: var(--text); margin-bottom: 6px; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 18px;
      font-size: 0.88rem;
      color: var(--text);
      z-index: 100;
      pointer-events: none;
      white-space: nowrap;
      transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Save indicator ── */
    #save-dot {
      position: fixed;
      top: 12px;
      right: 16px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 50;
    }
    #save-dot.on { opacity: 1; }

    /* ── Privacy note ── */
    .privacy-note {
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
      padding: 8px 0;
      line-height: 1.5;
    }

    @media (max-width: 380px) {
      .vbtn { width: 46px; height: 30px; font-size: 0.66rem; }
      .item-text { font-size: 0.87rem; }
    }
  </style>
</head>

function rid(n = 8) {
  const c = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';

async function sb(path, method = 'GET', body = null, extra = {}) {
  const headers = {
    apikey: S.key,
    Authorization: `Bearer ${S.key}`,
    'Content-Type': 'application/json',
    ...extra
  };
  const opts = { method, headers };
  if (body !== null) opts.body = JSON.stringify(body);
  const res = await fetch(`${S.url}/rest/v1/${path}`, opts);
  if (res.status === 204) return null;
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function loadPartnerVotes() {

async function flushVotes() {
  if (!S.pending.size && !S.deletes.size) return;
  setSaving(true);

  const upsertIds = [...S.pending];
  const deleteIds = [...S.deletes];
  S.pending.clear();
  S.deletes.clear();

  const work = [];

  if (upsertIds.length) {
    const body = upsertIds.map(id => ({
      session_id: S.sessionId,
      partner: S.partner,
      item_id: id,
      vote: S.myVotes[id],
      updated_at: new Date().toISOString()
    }));
    work.push(sb('votes', 'POST', body, { Prefer: 'resolution=merge-duplicates,return=minimal' }));

      `votes?session_id=eq.${S.sessionId}&partner=eq.${S.partner}&item_id=eq.${encodeURIComponent(id)}`,

    ));

    await Promise.all(work);

    deleteIds.forEach(id => S.deletes.add(id));

    <p style="color:var(--muted);font-size:0.82rem;margin:0 0 10px">Run this SQL once in your Supabase SQL Editor (Dashboard → SQL Editor):</p>
    <div class="code-block">${esc(SQL)}</div>
    <button class="btn btn-ghost" style="width:100%" onclick="copySQL()">Copy SQL</button>
  </div>
</div>`;
}

function screenLanding() {
  return `
<div id="s-landing" class="screen">
  <div class="hero"><h1>Yes · No · Maybe</h1><p>Private couples checklist</p></div>
  <div class="card">
    <h2>Start a session</h2>
    <p>Enter your name to create a private session. You'll get a link to share with your partner — they vote independently and neither of you sees the other's answers.</p>
    <div class="field">
      <label>Your name</label>
      <input id="land-name" type="text" placeholder="First name" maxlength="30" value="${esc(S.name)}">
    </div>
    <button class="btn btn-primary" onclick="onCreateSession()">Create session</button>
    <div id="land-err" class="error"></div>
  </div>
  <div style="text-align:center;margin-top:12px">
    <button class="btn btn-ghost" onclick="show('config')">Change Supabase credentials</button>
  </div>
</div>`;
}

function screenJoin() {
  return `
<div id="s-join" class="screen">
  <div class="hero"><h1>Yes · No · Maybe</h1><p>You've been invited</p></div>
  <div class="card">
    <h2>Join session</h2>
    <p>Your partner has created a session. Enter your name to join and vote independently. You won't see their choices — only mutual matches will be revealed.</p>
    <div class="field">
      <label>Your name</label>
      <input id="join-name" type="text" placeholder="First name" maxlength="30" value="${esc(S.name)}">
    </div>
    <button class="btn btn-primary" onclick="onJoinSession()">Join &amp; start voting</button>
    <div id="join-err" class="error"></div>
  </div>
  <div style="text-align:center;margin-top:12px">
    <button class="btn btn-ghost" onclick="show('config')">Change Supabase credentials</button>
  </div>
</div>`;
}

function screenVoting() {
  return `
<div id="s-voting" class="screen" style="padding-top:0">
  <div class="session-bar">
    <div class="left">
      <span>Session: <span class="session-code" id="s-code">${esc(S.sessionId)}</span></span>
      <span class="name-chip" id="s-name">${esc(S.name)}</span>
    </div>
    <button class="btn btn-ghost" style="padding:5px 12px;font-size:0.78rem" onclick="copyLink()">Copy invite link</button>
  </div>

  <div style="padding-top:14px">
    <div class="stats-bar" id="stats"></div>

    <div class="filter-bar">
      <button class="filter-btn active" data-f="all"          onclick="setFilter('all')">All</button>
      <button class="filter-btn"        data-f="both-yes"     onclick="setFilter('both-yes')">Both Yes</button>
      <button class="filter-btn"        data-f="both-curious" onclick="setFilter('both-curious')">Both Curious</button>
      <button class="filter-btn"        data-f="my-votes"     onclick="setFilter('my-votes')">My votes</button>
    </div>

    <div class="privacy-note">Your partner cannot see your individual votes — only mutual matches are shown to both of you.</div>

    <div id="cats">${renderCategories()}</div>
  </div>
</div>`;
}

function renderCategories() {
  return CATEGORIES.map((cat, ci) => `
    <div class="category" id="cat-${ci}">
      <div class="cat-header">${esc(cat.name)}</div>
      ${cat.items.map((item, ii) => {
        const id = `c${ci}-${ii}`;
        return `
        <div class="item" id="item-${id}">
          <div class="item-text">${esc(item)}</div>
          <div class="match-pill" id="pill-${id}" style="display:none"></div>
          <div class="item-btns">
            <button class="vbtn v-yes"   onclick="onVote('${id}','yes')">YES</button>
            <button class="vbtn v-no"    onclick="onVote('${id}','no')">NO</button>
            <button class="vbtn v-maybe" onclick="onVote('${id}','maybe')">MAYBE</button>
          </div>
        </div>`;
      }).join('')}
    </div>`
  ).join('');
}

// ═══════════════════════════════════════════════════════
// UI UPDATES
// ═══════════════════════════════════════════════════════

function updateStats() {
  const { bothYes, bothCurious, myCount, partnerCount } = calcStats();
  const el = document.getElementById('stats');
  if (!el) return;
  el.innerHTML = `
    <div class="stat s-yes">
      <div class="stat-val">${bothYes}</div>
      <div class="stat-lbl">Both Yes</div>
    </div>
    <div class="stat s-curious">
      <div class="stat-val">${bothCurious}</div>
      <div class="stat-lbl">Both Curious</div>
    </div>
    <div class="stat">
      <div class="stat-val">${myCount}</div>
      <div class="stat-lbl">You voted</div>
    </div>
    <div class="stat">
      <div class="stat-val">${partnerCount}</div>
      <div class="stat-lbl">Partner voted</div>
    </div>`;
}

function updateButtons(id) {
  const v = S.myVotes[id];
  const el = document.getElementById('item-' + id);
  if (!el) return;
  el.querySelectorAll('.vbtn').forEach(btn => {
    const bv = btn.classList.contains('v-yes') ? 'yes' : btn.classList.contains('v-no') ? 'no' : 'maybe';
    btn.classList.toggle('on', bv === v);
  });
}

function updateMatchPill(id) {
  const pill = document.getElementById('pill-' + id);
  if (!pill) return;
  if (isBothYes(id)) {
    pill.textContent = 'Match';
    pill.className = 'match-pill both-yes';
    pill.style.display = '';
  } else if (isBothCurious(id)) {
    pill.textContent = 'Curious';
    pill.className = 'match-pill both-curious';
    pill.style.display = '';
  } else {
    pill.style.display = 'none';
  }
}

function applyFilter() {
  let anyVisible = false;
  CATEGORIES.forEach((cat, ci) => {
    let catVisible = false;
    cat.items.forEach((_, ii) => {
      const id = `c${ci}-${ii}`;
      const vis = isVisible(id);
      const el = document.getElementById('item-' + id);
      if (el) el.classList.toggle('hidden', !vis);
      if (vis) { catVisible = true; anyVisible = true; }

      const itemEl = document.getElementById('item-' + id);
      if (itemEl) itemEl.classList.toggle('matched', isBothYes(id) || isBothCurious(id));

      updateMatchPill(id);
    });
    const catEl = document.getElementById('cat-' + ci);
    if (catEl) catEl.style.display = catVisible ? '' : 'none';
  });

  let empty = document.getElementById('cat-empty');
  if (!anyVisible && S.filter !== 'all') {
    if (!empty) {
      const div = document.createElement('div');
      div.id = 'cat-empty';
      div.className = 'empty';
      div.innerHTML = '<h3>No matches yet</h3><p>Come back once your partner has voted, or switch to All.</p>';
      document.getElementById('cats').appendChild(div);
    }
  } else if (empty) {
    empty.remove();
  }
}

function refreshVotingUI() {
  CATEGORIES.forEach((cat, ci) => {
    cat.items.forEach((_, ii) => {
      const id = `c${ci}-${ii}`;
      updateButtons(id);
    });
  });
  updateStats();
  applyFilter();
}

// ═══════════════════════════════════════════════════════
// HANDLERS
// ═══════════════════════════════════════════════════════

async function onConfigSave() {
  const url = (document.getElementById('cfg-url').value || '').trim().replace(/\/$/, '');
  const key = (document.getElementById('cfg-key').value || '').trim();
  if (!url || !key) { showError('cfg-err', 'Please enter both the project URL and the anon key.'); return; }

  S.url = url;
  S.key = key;

  try {
    await testConn();
  } catch (e) {
    showError('cfg-err', 'Connection failed. Double-check the URL and key, and make sure the SQL has been run.');
    S.url = localStorage.getItem('ynm_url') || '';
    S.key = localStorage.getItem('ynm_key') || '';
    return;
  }

  localStorage.setItem('ynm_url', url);
  localStorage.setItem('ynm_key', key);

  const pending = sessionStorage.getItem('ynm_pending');
  show(pending ? 'join' : 'landing');
}

async function onCreateSession() {
  const name = (document.getElementById('land-name').value || '').trim();
  if (!name) { showError('land-err', 'Please enter your name.'); return; }

  const id = rid();
  try {
    await createSession(id);
  } catch (e) {
    showError('land-err', 'Could not create session. Check your Supabase connection.');
    return;
  }

  S.sessionId = id;
  S.partner = 'p1';
  S.name = name;
  persist();
  await enterVoting();
  toast('Session created! Tap "Copy invite link" to share with your partner.');
}

async function onJoinSession() {
  const name = (document.getElementById('join-name').value || '').trim();
  if (!name) { showError('join-err', 'Please enter your name.'); return; }

  const sid = sessionStorage.getItem('ynm_pending') || S.sessionId;
  if (!sid) { showError('join-err', 'No session found. Ask your partner for a new link.'); return; }

  try {
    if (!await sessionExists(sid)) {
      showError('join-err', 'Session not found. The link may be expired or invalid.');
      return;
    }
  } catch (e) {
    showError('join-err', 'Could not connect. Check your Supabase credentials.');
    return;
  }

  S.sessionId = sid;
  S.partner = 'p2';
  S.name = name;
  persist();
  sessionStorage.removeItem('ynm_pending');
  history.replaceState({}, '', location.pathname);
  await enterVoting();
}

function onVote(id, vote) {
  if (S.myVotes[id] === vote) {
    delete S.myVotes[id];
    S.pending.delete(id);
    S.deletes.add(id);
  } else {
    S.myVotes[id] = vote;
    S.deletes.delete(id);
    S.pending.add(id);
  }
  scheduleSave();
  updateButtons(id);
  updateStats();
  applyFilter();
}

function setFilter(f) {
  S.filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.f === f));
  applyFilter();
}

function copySQL() {
  navigator.clipboard.writeText(SQL)
    .then(() => toast('SQL copied!'))
    .catch(() => toast('Select the SQL block and copy manually.'));
}

// ═══════════════════════════════════════════════════════
// SESSION
// ═══════════════════════════════════════════════════════

function persist() {
  localStorage.setItem('ynm_url',     S.url);
  localStorage.setItem('ynm_key',     S.key);
  localStorage.setItem('ynm_session', S.sessionId);
  localStorage.setItem('ynm_partner', S.partner);
  localStorage.setItem('ynm_name',    S.name);
}

async function enterVoting() {
  const codeEl = document.getElementById('s-code');
  const nameEl = document.getElementById('s-name');
  if (codeEl) codeEl.textContent = S.sessionId;
  if (nameEl) nameEl.textContent = S.name;

  try {
    await loadMyVotes();
    await loadPartnerVotes();
  } catch (e) {
    toast('Could not load votes. Check connection.');
    show('config');
    return;
  }

  show('voting');
  refreshVotingUI();
  startPolling();
}

function startPolling() {
  clearInterval(S.pollTimer);
  S.pollTimer = setInterval(async () => {
    try {
      await loadPartnerVotes();
      updateStats();
      applyFilter();
    } catch (_) {}
  }, 15000);
}

// ═══════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════

function init() {
  S.url       = localStorage.getItem('ynm_url')     || '';
  S.key       = localStorage.getItem('ynm_key')     || '';
  S.sessionId = localStorage.getItem('ynm_session') || '';
  S.partner   = localStorage.getItem('ynm_partner') || '';
  S.name      = localStorage.getItem('ynm_name')    || '';

  const params = new URLSearchParams(location.search);
  const urlSession = params.get('session');

  renderApp();

  if (!S.url || !S.key) {
    if (urlSession) sessionStorage.setItem('ynm_pending', urlSession);
    show('config');
    return;
  }

  if (urlSession) {
    if (urlSession === S.sessionId && S.partner) {
      enterVoting();
    } else {
      sessionStorage.setItem('ynm_pending', urlSession);
      show('join');
    }
    return;
  }

  if (S.sessionId && S.partner) {
    enterVoting();
    return;
  }

  show('landing');
}

// Keyboard submit
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const id = document.activeElement && document.activeElement.id;
  if (id === 'cfg-url' || id === 'cfg-key') onConfigSave();
  else if (id === 'land-name') onCreateSession();
  else if (id === 'join-name') onJoinSession();
});

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
